version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: audiobook-backend
    ports:
      - "8000:8000"
    volumes:
      - audiobook-data:/app/data
      - audiobook-storage:/app/app/storage
    environment:
      - DATABASE_URL=sqlite:///./data/audiobook.db
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: audiobook-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  audiobook-data:
    driver: local
  audiobook-storage:
    driver: local